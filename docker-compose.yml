services:
  overseerr:
    image: sct/overseerr:latest
    container_name: overseerr-app
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - ./config/overseerr:/app/config
    environment:
      - TZ=UTC
      - PORT=5055

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-request-bot
    restart: unless-stopped
    depends_on:
      - overseerr
    environment:
      - OVERSEERR_URL=http://overseerr:5055
      - OVERSEERR_SSL_VERIFY=true
    secrets:
      - telegram_bot_token
      - overseerr_api_key

secrets:
  telegram_bot_token:
    file: ./telegram_bot_token.txt
  overseerr_api_key:
    file: ./overseerr_api_key.txt
